<!DOCTYPE html>
<html>
<head>
  <title>Terminal Checklist</title>
  <style>
    body {
      background-color: black;
      color: #00ff00;
      font-family: monospace;
      padding: 20px;
    }
    input {
      background: black;
      color: #00ff00;
      border: none;
      outline: none;
      font-family: monospace;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="output"></div>
<input id="input" autofocus placeholder="Type command...">

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [
  {text:"Task 1", done:false},
  {text:"Task 2", done:false}
];

const output = document.getElementById("output");
const input = document.getElementById("input");

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render() {
  output.innerHTML = "📋 Checklist\n\n";
  tasks.forEach((t,i)=>{
    output.innerHTML += `${i+1}) [${t.done ? "x":" "}] ${t.text}\n`;
  });
  output.innerHTML += "\nCommands: number=toggle, a=add, d=delete, q=clear\n";
}

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let val = input.value.trim();
    input.value = "";

    if(val === "a"){
      let text = prompt("New task:");
      if(text){
        tasks.push({text, done:false});
      }
    }
    else if(val === "d"){
      let num = prompt("Delete which number?");
      tasks.splice(num-1,1);
    }
    else if(!isNaN(val)){
      let i = val-1;
      if(tasks[i]){
        tasks[i].done = !tasks[i].done;
      }
    }

    save();
    render();
  }
});

render();
</script>

</body>
</html>
